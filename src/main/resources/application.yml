spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}      # matches POSTGRES_USER in docker-compose.yml
    password: ${SPRING_DATASOURCE_PASSWORD}       # matches POSTGRES_PASSWORD in docker-compose.yml
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema, JPA only validates
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: ${SPRING_DATASOURCE_URL}
    user: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}

  data:
    redis:
      host: ${REDIS_HOST}             # Redis running in Docker, exposed on REDIS HOST
      port: ${REDIS_PORT}
      timeout: 2000ms

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION}           # 24 hours in milliseconds

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
    com.wallet: DEBUG

management:
    endpoints:
      web:
          exposure:
            include: health,info,metrics,prometheus
    endpoint:
      health:
        show-details: always
        probes:
         enabled: true  #liveness and readiness
    info:
      env:
        enabled: true
      build:
        enabled: true
      git:
        enabled: true

