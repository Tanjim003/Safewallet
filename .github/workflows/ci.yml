name: SafeWallet CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    env:
      TZ: Asia/Dhaka

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB:       wallet_db_test
          POSTGRES_USER:     wallet_user
          POSTGRES_PASSWORD: wallet_pass
        ports:
          - "5433:5432"
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - "6379:6379"
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4.7.1
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL:      jdbc:postgresql://localhost:5433/wallet_db_test
          SPRING_DATASOURCE_USERNAME: wallet_user
          SPRING_DATASOURCE_PASSWORD: wallet_pass
          REDIS_URL:                  redis://localhost:6379
          JWT_SECRET:                 HwS7Dn1JdLcraJPhmUteJIATZO9ouGDHr/U6raYRr166rtVRl+zO+UC5Fr1bA4vqE2k+tOFvJGTPd4AlE8Akmg==
          JWT_EXPIRATION:             86400000
          SPRING_PROFILES_ACTIVE:     test
        run: ./mvnw test --no-transfer-progress

      - name: Upload test report on failure
        if: failure()
        uses: actions/upload-artifact@v4.6.2
        with:
          name:              test-results-${{ github.run_id }}
          path:              target/surefire-reports/
          retention-days:    5
          if-no-files-found: ignore

      - name: Deploy to Render
        if: github.ref == 'refs/heads/main' && success()
        run: |
          curl -f -X POST "${{ secrets.RENDER_DEPLOY_HOOK }}"
          echo "Deploy triggered"