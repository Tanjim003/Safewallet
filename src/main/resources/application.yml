spring:
  datasource:
    url: jdbc:postgresql://localhost:5433/wallet_db
    username: wallet_user        # matches POSTGRES_USER in docker-compose.yml
    password: wallet_pass        # matches POSTGRES_PASSWORD in docker-compose.yml
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      connection-timeout: 30000

  jpa:
    hibernate:
      ddl-auto: validate         # Flyway owns the schema, JPA only validates
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
    url: jdbc:postgresql://localhost:5433/wallet_db
    user: wallet_user
    password: wallet_pass

  data:
    redis:
      host: localhost             # Redis running in Docker, exposed on localhost:6379
      port: 6379
      timeout: 2000ms

jwt:
  secret: 404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970
  expiration: 86400000           # 24 hours in milliseconds

server:
  port: 8080

logging:
  level:
    org.flywaydb: INFO
    com.wallet: DEBUG